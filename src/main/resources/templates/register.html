<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{/fragments/head}">
  <title>REGISTER FORM</title>
</head>
<body>

<div th:replace="~{fragments/navbar}">
</div>

<div class="container">
  <h2 class="text-center text-white">Register User</h2>
  <form th:method="POST"
        th:action="@{/users/register}"
        th:object="${userRegisterDto}"
        class="main-form mx-auto col-md-8 d-flex flex-column justify-content-center">
    <div class="row">
      <div class="form-group col-md-6 mb-3">
        <label for="username" class="text-white font-weight-bold">Username</label>
        <input class="form-control"
               id="username"
               th:field="*{username}"
               placeholder="Username"
               th:errorclass="is-invalid"
               type="text"/>
        <p class="invalid-feedback errors alert alert-danger">
          Username must be at least 6 characters long.
        </p>
      </div>

      <div class="form-group col-md-6 mb-3">
        <label for="email" class="text-white font-weight-bold">Email</label>
        <input id="email"
               th:field="*{email}"
               th:errorclass="is-invalid"
               type="text"  class="form-control"
               placeholder="example@email.com"/>
        <p class="invalid-feedback errors alert alert-danger">
          Email is required.
        </p>
      </div>

      <div class="form-group col-md-6 mb-3">
        <label for="password" class="text-white font-weight-bold">Password</label>
        <input id="password"
               th:field="*{password}"
               th:errorclass="is-invalid"
               type="password"
               class="form-control"
               placeholder="Password"/>
        <p class="invalid-feedback errors alert alert-danger">
          Password must be between 2 and 20 symbols.
        </p>
      </div>

      <div class="form-group col-md-6 mb-3">
        <label for="confirmPassword" class="text-white font-weight-bold ">Confirm password</label>
        <input id="confirmPassword"
               th:field="*{confirmPassword}"
               th:errorclass="is-invalid"
               type="password"
               class="form-control"
               placeholder="Confirm password"/>
        <p class="invalid-feedback errors alert alert-danger">
          Passwords miss match.
        </p>
      </div>
    </div>
    <div class="row">
      <div class="col col-md-4">
        <div class="button-holder d-flex">
          <input type="submit" class="btn btn-info btn-lg" value="Register"/>
        </div>
      </div>
    </div>
  </form>
</div>

<div>
  <footer> </footer>
</div>

</body>
</html>
