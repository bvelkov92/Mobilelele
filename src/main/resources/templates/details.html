<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{/fragments/head}"
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">>
</head>

<body>

<div>
    <nav th:replace="~{fragments/navbar}"></nav>
</div>

<div class="container-fluid">
    <h2 class="text-center text-white mt-5">Details</h2>
    <div class="offers row mx-auto d-flex flex-row justify-content-center">
        <div class="offer card col-sm-2 col-md-3  col-lg-4 m-1 p-0" >

            <div class="card-body pb-1">
                <h5 class="card-title">
                    Offer year Brand name Model name</h5>
            </div>
            <ul class="offer-details list-group list-group-flush">
                <li class="list-group-item">
                    <div class="card-text">Mileage: <span th:text ="${offer.mileage}"></span></div>
                    <div class="card-text">Price: <span th:text ="${offer.price}"></span></div>
                    <div class="card-text">Engine: <span th:text = "${offer.engineType}"></span></div>
                    <div class="card-text">Transmission:  <span th:text = "${offer.transmissionType}"></span></div>
                    <div class="card-text"> <span th:text = "${offer.offerCreated}"></span></div>
                    <div class="card-text"><span th:text = "${offer.offerModified}"></span></div>
                    <div class="card-text">Created by; <span th:text ="${offer.user}"></span></div>
                </li>
            </ul>
            <div class="card-body"
                 sec:authorize="hasRole('ADMIN')">
                <a class="card-link "
                   th:href="@{/offers/{id}/update(id=${offer.id})}">Update</a>
                <a class="card-link"
                   data-bs-toggle="modal"
                   data-bs-target="#deleteModal"
                   th:attr="data-id=${offer.id}">
                    Delete
                </a>
            </div>
        </div>
        <div class="offer card col-sm-2 col-md-3  col-lg-4 m-1 p-0">
            <img th:src="${offer.imageUrl}" class="card-img-top"  alt="Car image">
        </div>
    </div>
</div>
<div>
             <footer> </footer>
</div>


<div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Confirm delete</h5>
            </div>

            <div class="modal-body">
                Are you sure you want to delete this offer?
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary"
                        data-bs-dismiss="modal">Cancel</button>

                <a id="confirmDeleteBtn" class="btn btn-danger">
                    Delete
                </a>
            </div>

        </div>
    </div>
</div>
<script>
    document.addEventListener("DOMContentLoaded", function () {

      const modal = document.getElementById('deleteModal');
      const deleteBtn = document.getElementById('confirmDeleteBtn');

      modal.addEventListener('show.bs.modal', function (event) {

        const button = event.relatedTarget;
        const offerId = button.getAttribute("data-id");

        deleteBtn.href = "/offers/" + offerId + "/delete";
      });

    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
