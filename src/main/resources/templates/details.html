<!DOCTYPE html>
<html lang="en"  xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{/fragments/head}">
</head>

<body>

<div>
    <nav th:replace="~{fragments/navbar}"></nav>
</div>

<div class="container-fluid">
    <h2 class="text-center text-white mt-5">Details</h2>
    <div class="offers row mx-auto d-flex flex-row justify-content-center">
        <div class="offer card col-sm-2 col-md-3  col-lg-4 m-1 p-0" >

            <div class="card-body pb-1">
                <h5 class="card-title">
                    Offer year Brand name Model name</h5>
            </div>
            <ul class="offer-details list-group list-group-flush">
                <li class="list-group-item">
                    <div class="card-text"><span th:text ="${offer.mileage}"></span></div>
                    <div class="card-text"><span th:text ="${offer.price}"></span></div>
                    <div class="card-text"><span th:text = "${offer.engineType}"></span></div>
                    <div class="card-text"><span th:text = "${offer.transmissionType}"></span></div>
                    <div class="card-text"><span th:text = "${offer.offerCreated}"></span></div>
                    <div class="card-text"><span th:text = "${offer.offerModified}"></span></div>
<!--                    <div class="card-text"><span>• Seller - First and Last name</span></div>-->
                </li>
            </ul>
            <div class="card-body">
                <a class="card-link" th:href="@{/offers/{id}/update(id=${offer.id})}">Update</a>
                <a class="card-link" th:href="@{/offers/{id}/delete(id=${offer.id})}">Delete</a>
            </div>
        </div>
        <div class="offer card col-sm-2 col-md-3  col-lg-4 m-1 p-0">
            <img src="/" class="card-img-top"  alt="Car image">
        </div>
    </div>
</div>

<div>
             <footer> </footer>
</div>

</body>
</html>
