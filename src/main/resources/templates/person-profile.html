<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{/fragments/head}">
</head>

<body>

<div>
    <nav th:replace="~{fragments/navbar}"></nav>
</div>

<div class="container-fluid">
    <h2 class="text-center text-white mt-5">Profile</h2>
    <div class="offers row mx-auto d-flex flex-row justify-content-center">
        <div class="offer card col-sm-2 col-md-3  col-lg-4 m-1 p-0" >
            <ul class="offer-details list-group list-group-flush">
                <li class="list-group-item">
                    <div class="card-text">Username: <span th:text ="${profile.username}"></span></div>
                    <div class="card-text">First Name: <span th:text ="${profile.firstName}"></span></div>
                    <div class="card-text">Last Name: <span th:text = "${profile.lastName}"></span></div>
                    <div class="card-text">Age: <span th:text = "${profile.age}"></span></div>
                    <div class="card-text">Email:  <span th:text = "${profile.email}"></span></div>
                    <div class="card-text">Role: <span th:text = "${profile.role.roleName}"></span></div>
                </li>
            </ul>
            <div class="card-body"
                 sec:authorize="isAuthenticated()">
                <form th:action="@{/users/profile/editProfile}">
                    <button type="submit" class="btn btn-primary">Update profile</button>
                </form>
                <form th:action="@{/users/profile/password}" method="get">
                    <button type="submit" class="btn btn-primary">Change password</button>
                </form>
            </div>
        </div>
        <div class="offer card col-sm-2 col-md-3  col-lg-4 m-1 p-0">
            <img th:src="${profile.imageUrl}" class="card-img-top"  alt="Profile picture">
        </div>
    </div>
</div>
<div>
    <footer> </footer>
</div>
</body>
</html>
