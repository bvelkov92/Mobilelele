<!DOCTYPE html>
<html lang="en">

<head th:replace="~{/fragments/head}">
</head>

<body>
    
	<div>
        <nav th:replace="~{fragments/navbar}"></nav>
	</div>


    <div class="container-fluid">
        <h2 class="text-center text-white mt-5">All Offers</h2>
        <div class="offers row mx-auto d-flex flex-row justify-content-center"
        th:each = "offer : ${offers}"
        >
            <div class="offer card col-sm-6 col-md-3  col-lg-2 m-1 p-0">
                <div class="card-img-top-wrapper">
                    <img class="card-img-top" th:src="${offer.imageUrl}" alt="Car image">
                </div>
                <div class="card-body pb-1">
                    <h5 class="card-title">
                        <span th:text="${offer.year}"></span>
                        <span th:text="${offer.brand}"></span>
                        <span th:text="${offer.model}"></span>
                    </h5>
                </div>
                <ul class="offer-details list-group list-group-flush">
                    <li class="list-group-item">
                        <div class="card-text">Mileages: <span th:text ="${offer.mileage}"></span></div>
                        <div class="card-text">Price: <span th:text ="${offer.price}"></span></div>
                        <div class="card-text">Engine: <span th:text ="${offer.engine}"></span></div>
                        <div class="card-text">Transmission: <span th:text ="${offer.transmission}"></span></div>
                    </li>
                </ul>
                <div class="card-body">
                    <a class="card-link" th:href="@{/offers/{id}/details(id=${offer.id})}">Details</a>
                </div>
            </div>
        </div>
    </div>

    <div>
		<footer> </footer>
	</div>

</body>
</html>
