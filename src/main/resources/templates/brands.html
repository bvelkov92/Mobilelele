<!DOCTYPE html>
<html lang="en" >

<head th:replace="~{/fragments/head}"></head>
<body>

<div>
    <nav th:replace="~{fragments/navbar}"></nav>
</div>

<div class="container">
    <h2 class="text-center text-white m-3">All Brands</h2>
    <div class='row mb-4 d-flex justify-content-around'
    th:each = "brand : ${brands}">
        <div  class="brand-section col-md-5 mr-auto d-flex flex-column">
            <h2>
                <span th:text = "${brand.name}" ></span>
            </h2>
            <table class="table">
                <thead>
                <tr>
                    <th>Model</th>
                    <th>Category</th>
                    <th>Start Year</th>
                    <th>End Year</th>
                    <th>Picture</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="model : ${brand.models}">
                    <td th:text="${model.name}"></td>
                    <td th:text="${model.categoryVehicle}"></td>
                    <td th:text="${model.startYear}"></td>
                    <td th:text="${model.endYear}"></td>
                    <td th:text="${model.image}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div>
             <footer> </footer>
    </div>
</div>
</body>
</html>
