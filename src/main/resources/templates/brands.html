<!DOCTYPE html>
<html lang="en" >

<head th:replace="~{/fragments/head}">
</head>
<body>

<div>
    <nav th:replace="~{fragments/navbar}"></nav>
</div>

<div class="container">
    <h2 class="text-center text-white m-3">All Brands</h2>
    <div class='row mb-4 d-flex justify-content-around'
    th:each = "brand : ${brands}"
    >
        <div  class="brand-section col-md-5 mr-auto d-flex flex-column">
            <h2>Brand:
                <span th:text = "${brand.name}" ></span>
            </h2>


            <div>
                <tr>
                    <th>No</th>
                    <th >Model</th>
                    <th >Category</th>
                    <th >Start Year</th>
                    <th >End Year</th>
                    <!--                <th><img alt="image" src="/" class="img-thumbnail rounded"></th>-->
                </tr>

                <table th:each = "model : ${brand.models}">
                    <tr>
                        <th th:text = "${model.id}">No</th>
                        <th th:text = "${model.name}">Name</th>
<!--                        <th th:text = "${brand.category_vehicle}">Category</th>-->
                        <th th:text = "${model.startYear}">Start Year</th>
                        <th th:text = "${model.endYear}">End Year</th>
                        <th th:text = "${model.image}">Picture</th>
                    </tr>

                </table>
            </div>
        </div>
    </div>

    <div>
             <footer> </footer>
    </div>
</div>
</body>
</html>
